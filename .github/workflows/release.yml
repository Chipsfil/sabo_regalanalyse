name: Release Windows Only

on:
  push:
    tags: [ 'v*.*.*' ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with: { node-version: 20 }
    - run: npm ci
    - run: npm run build
    - run: npm run publish
      env:
        GITHUB_TOKEN: ${{ secrets.Sabo }}
