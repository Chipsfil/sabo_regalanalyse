name: Release Windows Only

on:
  push:
    tags: [ 'v*.*.*' ]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with: { node-version: 20 }
    - name: Install dependencies
      run: |
        if (Test-Path package-lock.json) {
          npm ci
        } else {
          npm install
        }
    - run: npm run build
    - run: npm run publish
      env:
        GITHUB_TOKEN: ${{ secrets.Sabo }}
